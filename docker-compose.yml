version: '3.8'

services:
  api:
    build: .
    ports:
      - "2000:2000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - temp_media:/tmp/media-master
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A app.workers.celery_app worker -l info -c 4 --max-tasks-per-child=50
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - temp_media:/tmp/media-master
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A app.workers.celery_app beat -l info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: media_master
      POSTGRES_USER: media
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media -d media_master"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  temp_media:
